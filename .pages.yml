media:
  input: assets
  output: /assets

content:
  - name: portfolio_data
    label: "Manage Portfolio Content"
    type: file
    path: "data/content.json" # Everything gets stored beautifully in one single file
    format: json
    fields:
      
      # --- PROFILE TRACK ---
      - name: name
        label: "Full Name"
        type: string
      - name: title_tag
        label: "Title Tag"
        type: string

      # --- EXPERIENCES ---
      - name: experiences
        label: "Professional Experiences"
        type: list
        fields:
          - { name: title, label: "Job Title", type: string }
          - { name: company, label: "Company", type: string }
          - { name: date_badge, label: "Dates Active", type: string }
          - name: bullet_points
            label: "Responsibilities"
            type: list
            fields:
              - { name: point, label: "Bullet Point", type: string }

      # --- ACADEMIC WORKS ---
      - name: academic_works
        label: "Academic Works Dashboard"
        type: list
        fields:
          - { name: tag, label: "Course / Topic Tag", type: string }
          - { name: title, label: "Project Title", type: string }
          - { name: description, label: "Project Description", type: text }
          - { name: file_link, label: "PDF File Upload", type: file, required: false }
          - { name: link_text, label: "Link Action Button Text", type: string }

      # --- COMPETENCIES ---
      - name: competencies
        label: "Core Competencies"
        type: list
        fields:
          - { name: category, label: "Skill Category", type: string }
          - name: pills
            label: "Skills (Pills)"
            type: list
            fields:
              - { name: skill_name, label: "Skill Name", type: string }