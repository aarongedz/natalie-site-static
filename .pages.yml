media:
  - name: assets
    label: "Assets"
    input: "assets"
    output: "/assets"
    categories: [image, document]

content:
  - name: portfolio
    label: Portfolio Content
    type: group
    items:
      - name: profile
        label: Name & Contact Info
        type: file
        path: _data/profile.yml
        fields:
          - { name: name, label: "Name", type: string }
          - { name: tagline, label: "Tagline", type: string }
          - { name: phone, label: "Phone", type: string }
          - { name: email, label: "Email", type: string }
          - { name: linkedin, label: "LinkedIn URL", type: string }

      - name: experience
        label: Experience
        type: file
        path: _data/experience.yml
        view: { primary: role }
        fields:
          - name: items
            label: Experience Items
            type: object
            list: true
            fields:
              - { name: role, label: "Role", type: string }
              - { name: company, label: "Company", type: string }
              - { name: timeline, label: "Timeline", type: string }
              - name: bullets
                label: "Bullets"
                type: string
                list: true

      - name: education
        label: Education
        type: file
        path: _data/education.yml
        view: { primary: degree }
        fields:
          - name: items
            label: Education Items
            type: object
            list: true
            fields:
              - { name: degree, label: "Degree", type: string }
              - { name: school, label: "School", type: string }
              - { name: date, label: "Date", type: string }
              - { name: focus, label: "Focus", type: string }
              - { name: description, label: "Description", type: text }

      - name: academic
        label: Academic Work
        type: file
        path: _data/academic.yml
        view: { primary: title }
        fields:
          - name: items
            label: Projects
            type: object
            list: true
            fields:
              - { name: title, label: "Title", type: string }
              - { name: desc, label: "Description", type: text }
              # By using type: file, the CMS triggers the Asset Folder browser
              - { name: link, label: "Select Project File", type: file }
              - { name: link_text, label: "Link Text", type: string }

      - name: competencies
        label: Competencies
        type: file
        path: _data/competencies.yml
        view: { primary: title }
        fields:
          - name: items
            label: Skill Groups
            type: object
            list: true
            fields:
              - { name: title, label: "Group Title", type: string }
              - name: pills
                label: "Skills"
                type: string
                list: true