# Pages CMS Configuration
collections:
  - label: "Posts" # Change this to match your content type
    name: "posts"
    folder: "content/posts" # UPDATE THIS: path to your markdown files
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        required: true
      - label: "Date"
        name: "date"
        widget: "datetime"
      - label: "Body"
        name: "body"
        widget: "markdown"
        required: true
      # Add more fields based on your existing frontmatter
      # Example:
      # - label: "Image"
      #   name: "thumbnail"
      #   widget: "image"