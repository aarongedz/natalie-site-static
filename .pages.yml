# .pages.yml
content:
  - name: portfolio_home
    label: "Master Website Editor"
    type: file
    path: "index.html"
    format: yaml-frontmatter
    fields:
      - { name: name, label: "Profile Name", type: string }
      - { name: tagline, label: "Professional Tagline", type: string }
      - { name: phone, label: "Phone Number", type: string }
      - { name: email, label: "Email Address", type: string }
      - { name: linkedin, label: "LinkedIn URL", type: string }
        
      - name: experience_tab
        label: "Experience Items"
        type: list
        fields:
          - { name: role, label: "Job Title", type: string }
          - { name: company, label: "Company / Location", type: string }
          - { name: timeline, label: "Dates Active", type: string }
          - name: bullets
            label: "Accomplishment Bullets"
            type: list
            field: { type: string, label: "Bullet Line" }

      - name: education_tab
        label: "Education Tracks"
        type: list
        fields:
          - { name: degree, label: "Degree / Certificate", type: string }
          - { name: school, label: "Institution", type: string }
          - { name: date, label: "Graduation Date", type: string }
          - { name: focus, label: "Specialization Focus", type: string }
          - { name: description, label: "Overview", type: text }

      - name: academic_tab
        label: "Academic Portfolio Dashboard"
        type: list
        fields:
          - { name: tag, label: "Card Category Tag", type: string }
          - { name: title, label: "Project Title", type: string }
          - { name: desc, label: "Project Description", type: text }
          - { name: link, label: "Asset File Path (e.g., assets/file.pdf)", type: string }
          - { name: link_text, label: "Button Display Text", type: string }

      - name: skills_tab
        label: "Core Competency Domains"
        type: list
        fields:
          - { name: title, label: "Domain Category Title", type: string }
          - name: pills
            label: "Competency Pills / Tags"
            type: list
            field: { type: string, label: "Skill Tag" }