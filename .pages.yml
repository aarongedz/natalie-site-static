# .pages.yml at your repository root
media:
  input: public/media
  output: /media

content:
  - name: portfolio
    label: "Natalie Romeo Portfolio"
    type: file
    path: "index.html" # Points directly to your template file
    format: yaml-frontmatter # Treats the top of your HTML file as the CMS database
    fields:
      # --- Profile Meta (Sidebar Strings) ---
      - name: name
        label: "Profile Name"
        type: string
        required: true
      - name: tagline
        label: "Professional Tagline"
        type: string
      - name: phone
        label: "Phone Number"
        type: string
      - name: email
        label: "Email Address"
        type: string

      # --- Tab 1: Experience (Repeater List) ---
      - name: experience
        label: "Professional Experience"
        type: list
        fields:
          - name: role
            label: "Role/Title"
            type: string
          - name: company
            label: "Company/Organization"
            type: string
          - name: timeline
            label: "Employment Dates"
            type: string
          - name: bullet_points
            label: "Key Accomplishments (One per line)"
            type: list
            field: { type: string }

      # --- Tab 2: Education (Repeater List) ---
      - name: education
        label: "Education Tracks"
        type: list
        fields:
          - name: degree
            label: "Degree / Program Track"
            type: string
          - name: school
            label: "University or Institution"
            type: string
          - name: date
            label: "Graduation Date"
            type: string
          - name: core_focus
            label: "Core Specialization Focus"
            type: string
          - name: description
            label: "Track Breakdown/Description"
            type: text

      # --- Tab 3: Academic Portfolio (Grid Repeater) ---
      - name: academic_work
        label: "Academic Works Dashboard"
        type: list
        fields:
          - name: tag
            label: "Institution / Subject Tag"
            type: string
          - name: title
            label: "Project Title"
            type: string
          - name: description
            label: "Project Overview"
            type: text
          - name: link_label
            label: "Resource Link Label"
            type: string

      # --- Tab 4: Core Competencies (Nested Categorized Lists) ---
      - name: competencies
        label: "Core Competencies"
        type: list
        fields:
          - name: category_title
            label: "Competency Cluster Title"
            type: string
          - name: skills_pills
            label: "Skills / Skills Pills"
            type: list
            field: { type: string }