media:
  path: assets/images

content:
  - name: portfolio_content
    label: "Portfolio Tabs Editor"
    type: file
    path: "data.json"   # This is the file the CMS will write to
    format: json
    fields:
      # --- SIDE NAV / MAIN META ---
      - name: name
        label: "Profile Name"
        type: string
      - name: tagline
        label: "Professional Tagline"
        type: string

      # --- EXPERIENCE TAB ---
      - name: experience_tab
        label: "Experience Content"
        type: list
        fields:
          - name: role
            label: "Job Title"
            type: string
          - name: company
            label: "Company Name"
            type: string
          - name: timeline
            label: "Dates Worked"
            type: string
          - name: bullet_points
            label: "Bullet Points"
            type: list
            field: { type: string, label: "Bullet" }

      # --- EDUCATION TAB ---
      - name: education_tab
        label: "Education Content"
        type: list
        fields:
          - name: degree
            label: "Degree/Certificate"
            type: string
          - name: school
            label: "School/Institution"
            type: string
          - name: date
            label: "Graduation Date"
            type: string
          - name: core_focus
            label: "Focus/Major"
            type: string
          - name: description
            label: "Short Description"
            type: text

      # --- ACADEMIC WORK TAB ---
      - name: academic_tab
        label: "Academic Portfolio"
        type: list
        fields:
          - name: tag
            label: "Category Tag (e.g. Urban Design)"
            type: string
          - name: title
            label: "Project Title"
            type: string
          - name: description
            label: "Project Details"
            type: text

      # --- COMPETENCYS/SKILLS TAB ---
      - name: skills_tab
        label: "Skills & Clusters"
        type: list
        fields:
          - name: category_title
            label: "Group Title (e.g. Front-End)"
            type: string
          - name: skills_pills
            label: "Individual Skills"
            type: list
            field: { type: string, label: "Skill Tag" }