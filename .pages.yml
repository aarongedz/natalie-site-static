content:
  - name: portfolio
    label: Portfolio Data
    type: group
    items:
      - name: experience
        label: Experience
        type: file
        path: _data/experience.yml
        # This fixes the [object Object] error:
        view:
          primary: role
        fields:
          - name: items
            label: Experience Items
            type: object
            list: true
            fields:
              - { name: role, label: "Role", type: string }
              - { name: company, label: "Company", type: string }
              - { name: timeline, label: "Timeline", type: string }
              - name: bullets
                label: "Bullets"
                type: string
                list: true