# 1. Define where uploaded media files go
media:
  input: assets
  output: /assets

# 2. Structure your site segments for editing
content:
  # --- GLOBAL INFORMATION (Sidebar Contact & Header) ---
  - name: profile
    label: "Profile & Contact Info"
    type: file
    path: "data/profile.json" # Pages CMS will write simple JSON here
    format: json
    fields:
      - { name: name, label: "Full Name", type: string }
      - { name: title_tag, label: "Title Tag", type: string }
      - { name: phone, label: "Phone Number", type: string }
      - { name: email, label: "Email Address", type: string }
      - { name: linkedin, label: "LinkedIn URL", type: string }

  # --- EXPERIENCES TAB ---
  - name: experience
    label: "Professional Experience"
    type: collection
    path: "data/experience" # Creates individual files per job entry
    format: json
    filename: "{primary}.json"
    view:
      primary: title
    fields:
      - { name: title, label: "Job Title", type: string }
      - { name: company, label: "Company Name", type: string }
      - { name: date_badge, label: "Dates (Badge)", type: string, description: "e.g., July 2016 - Present" }
      - { name: order, label: "Sort Order", type: number, description: "Higher numbers sort higher" }
      - name: bullet_points
        label: "Responsibilities"
        type: list
        fields:
          - { name: point, label: "Bullet Point Text", type: string }

  # --- EDUCATION TAB ---
  - name: education
    label: "Education Tracks"
    type: collection
    path: "data/education"
    format: json
    filename: "{primary}.json"
    view:
      primary: degree
    fields:
      - { name: degree, label: "Degree/Program Type", type: string, description: "e.g., Graduate Program" }
      - { name: institution, label: "Institution", type: string }
      - { name: date_badge, label: "Dates (Badge)", type: string }
      - { name: specialization, label: "Specialization Title", type: string }
      - { name: description, label: "Description", type: text }
      - { name: order, label: "Sort Order", type: number }

  # --- ACADEMIC WORKS TAB ---
  - name: academic_work
    label: "Academic Works Dashboard"
    type: collection
    path: "data/portfolio"
    format: json
    filename: "{primary}.json"
    view:
      primary: title
    fields:
      - { name: tag, label: "Course / Topic Tag", type: string, description: "e.g., UCF / AI Automation" }
      - { name: title, label: "Project Title", type: string }
      - { name: description, label: "Project Description", type: text }
      - { name: file_link, label: "PDF File Upload", type: file, required: false }
      - { name: link_text, label: "Link Action Button Text", type: string, description: "e.g., View Research Proposal" }

  # --- COMPETENCiES (SKILLS) TAB ---
  - name: competencies
    label: "Core Competencies"
    type: collection
    path: "data/competencies"
    format: json
    filename: "{primary}.json"
    view:
      primary: category
    fields:
      - { name: category, label: "Skill Category", type: string, description: "e.g., Operational Excellence" }
      - { name: order, label: "Sort Order", type: number }
      - name: pills
        label: "Skills (Pills)"
        type: list
        fields:
          - { name: skill_name, label: "Skill Name", type: string }