content:
  - name: portfolio_data
    label: Portfolio Data
    type: group
    items:
      - name: experience
        label: Experience
        type: file
        path: _data/experience.yml
        # The primary key must exist in your YAML file
        view: { primary: role }
        fields:
              - { name: role, label: "Job Title", type: string }
              - { name: company, label: "Company", type: string }
              - { name: timeline, label: "Dates", type: string }
              - name: bullets
                label: "Bullets"
                type: string
                list: true # This makes bullets a nested list of strings