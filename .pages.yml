# Root configuration for Pages CMS
content:
  - name: settings
    label: "Site Settings"
    type: group
    items:
      - name: profile
        label: "Profile Info"
        type: file
        path: "_data/profile.yml"
        fields:
          - { name: name, label: "Name", type: string }
          - { name: tagline, label: "Tagline", type: string }
          - { name: phone, label: "Phone", type: string }
          - { name: email, label: "Email", type: string }

  - name: portfolio
    label: "Portfolio Data"
    type: group
    items:
      - name: experience
        label: "Experience"
        type: file
        path: "_data/experience.yml"
        fields:
          - name: items
            label: "Experience Items"
            type: list
            # Using the summary property for readability instead of [object Object]
            summary: "{role} at {company}"
            fields:
              - { name: role, label: "Role", type: string }
              - { name: company, label: "Company", type: string }
              - { name: timeline, label: "Timeline", type: string }
              - name: bullets
                label: "Bullets"
                type: list
                field: { type: string, label: "Bullet" }

      - name: education
        label: "Education"
        type: file
        path: "_data/education.yml"
        fields:
          - name: items
            label: "Education Tracks"
            type: list
            summary: "{degree} - {school}"
            fields:
              - { name: degree, label: "Degree", type: string }
              - { name: school, label: "Institution", type: string }
              - { name: date, label: "Date", type: string }

      - name: academic
        label: "Academic Work"
        type: file
        path: "_data/academic.yml"
        fields:
          - name: items
            label: "Projects"
            type: list
            summary: "{title}"
            fields:
              - { name: title, label: "Title", type: string }
              - { name: tag, label: "Category", type: string }
              - { name: desc, label: "Description", type: text }