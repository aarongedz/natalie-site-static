media:
  input: public/media
  output: /media

content:
  - name: portfolio_data
    label: "Portfolio Editor"
    type: file
    path: "data.json"
    format: json
    fields:
      - name: name
        label: "Profile Name"
        type: string
      - name: tagline
        label: "Professional Tagline"
        type: string
      - name: phone
        label: "Phone Number"
        type: string
      - name: email
        label: "Email Address"
        type: string
      - name: linkedin
        label: "LinkedIn Label"
        type: string

      - name: experience
        label: "Professional Experience"
        type: list
        fields:
          - name: role
            label: "Role/Title"
            type: string
          - name: company
            label: "Company/Organization"
            type: string
          - name: timeline
            label: "Employment Dates"
            type: string
          - name: bullet_points
            label: "Key Accomplishments"
            type: list
            field: { type: string }

      - name: education
        label: "Education Tracks"
        type: list
        fields:
          - name: degree
            label: "Degree / Program Track"
            type: string
          - name: school
            label: "University or Institution"
            type: string
          - name: date
            label: "Graduation Date"
            type: string
          - name: core_focus
            label: "Core Specialization Focus"
            type: string
          - name: description
            label: "Track Breakdown/Description"
            type: text

      - name: academic_work
        label: "Academic Works Dashboard"
        type: list
        fields:
          - name: tag
            label: "Institution / Subject Tag"
            type: string
          - name: title
            label: "Project Title"
            type: string
          - name: description
            label: "Project Overview"
            type: text
          - name: link_label
            label: "Resource Link Label"
            type: string

      - name: competencies
        label: "Core Competencies"
        type: list
        fields:
          - name: category_title
            label: "Competency Cluster Title"
            type: string
          - name: skills_pills
            label: "Skills / Skills Pills"
            type: list
            field: { type: string }