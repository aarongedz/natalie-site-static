content:
  - name: settings
    label: "Site Settings"
    type: group
    items:
      - name: profile
        label: "Profile Info"
        type: file
        path: "_data/profile.yml"
        fields:
          - { name: name, label: "Name", type: string }
          - { name: tagline, label: "Tagline", type: string }
          - { name: phone, label: "Phone", type: string }
          - { name: email, label: "Email", type: string }

content:
  - name: portfolio_data
    label: Portfolio Data
    type: group
    items:
      - name: experience
        label: Experience
        type: file
        path: _data/experience.yml
        fields:
          - name: items
            label: Experience Items
            type: list
            # This 'view' tells the CMS which field to use as the title
            view:
              primary: role
            fields:
              - { name: role, label: "Role", type: string }
              - { name: company, label: "Company", type: string }
              - { name: timeline, label: "Timeline", type: string }
              - name: bullets
                label: Bullets
                type: list
                field: { type: string, label: "Bullet" }