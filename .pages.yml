# .pages.yml at your repository root

media:
  path: public/images # Or assets/images, where your pictures go

content:
  # --- EXAMPLE 1: A SINGLE EXPLICIT FILE (e.g., your home page or an academic profile card) ---
  - name: homepage
    label: Homepage Content
    type: file
    path: index.md # The exact path to the file in your repo
    format: yaml-frontmatter
    fields:
      - name: title
        label: Page Title
        type: string
        required: true
      - name: description
        label: Meta Description
        type: string
      - name: body
        label: Main Body Content
        type: rich-text # This gives you the Notion-like visual editor

  # --- EXAMPLE 2: A COLLECTION OF SIMILAR FILES (e.g., projects, posts, or slices) ---
  - name: projects
    label: My Projects
    type: collection
    path: content/projects # The folder where markdown files are stored
    format: yaml-frontmatter
    filename: "{primary}.md" # Automatically names the file based on the 'primary' view key below
    view:
      fields: [title, date]
      primary: title
      sort: [date]
    fields:
      - name: title
        label: Project Name
        type: string
        required: true
      - name: date
        label: Date Published
        type: date
      - name: body
        label: Project Details
        type: rich-text

settings:
  content:
    merge: true # Keeps outside key properties from getting deleted when saving