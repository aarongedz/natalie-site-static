media:
  input: assets
  output: /assets

content:
  - name: homepage
    label: "Portfolio Layout Control"
    type: file
    path: "index.html"
    format: yaml-frontmatter
    fields:
      # --- SIDEBAR & CONTACT ---
      - { name: name, label: "Full Name", type: string }
      - { name: title_tag, label: "Title Tag", type: string }
      - { name: phone, label: "Phone Number", type: string }
      - { name: email, label: "Email Address", type: string }
      - { name: linkedin, label: "LinkedIn URL", type: string }

      # --- EXPERIENCES TAB (+ ADD NEW CAPABLE) ---
      - name: experiences
        label: "Professional Experiences"
        type: list
        fields:
          - { name: title, label: "Job Title", type: string }
          - { name: company, label: "Company/Location", type: string }
          - { name: dates, label: "Dates Badge", type: string }
          - name: bullet_points
            label: "Responsibilities & Metrics"
            type: list
            fields:
              - { name: point, label: "Individual Bullet Point", type: string }

      # --- ACADEMIC WORKS TAB (+ ADD NEW CAPABLE) ---
      - name: academic_works
        label: "Academic Works Dashboard"
        type: list
        fields:
          - { name: tag, label: "Course / Topic Tag", type: string }
          - { name: title, label: "Project Title", type: string }
          - { name: description, label: "Project Description", type: text }
          - { name: file_link, label: "PDF File Upload", type: file }
          - { name: link_text, label: "Link Action Button Text", type: string }

      # --- CORE COMPETENCIES (+ ADD NEW CAPABLE) ---
      - name: competencies
        label: "Core Competencies"
        type: list
        fields:
          - { name: category, label: "Skill Category Group Title", type: string }
          - name: pills
            label: "Skill Badges (Pills)"
            type: list
            fields:
              - { name: skill_name, label: "Skill Name", type: string }