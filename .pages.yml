content:
  - name: website_sections
    label: "Website Sections"
    type: group
    items:
      - name: profile
        label: "1. Profile Info"
        type: file
        path: "data/profile.yml"
        format: yaml
        fields:
          - { name: name, label: "Profile Name", type: string }
          
      - name: posts
        label: "Blog Posts"
        type: collection
        path: content/posts
        fields:
          - { name: title, type: string }