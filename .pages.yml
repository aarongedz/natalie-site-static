content:
  - name: portfolio_home
    label: "Master Website Editor"
    type: file
    path: "index.html"
    format: yaml-frontmatter
    fields:
      - name: name
        label: "Profile Name"
        type: string
      - name: tagline
        label: "Professional Tagline"
        type: string
      - name: phone
        label: "Phone Number"
        type: string
      - name: email
        label: "Email Address"
        type: string
      - name: linkedin
        label: "LinkedIn URL"
        type: string
        
      - name: experience_tab
        label: "Tab 1: Experience Sections"
        type: list
        fields:
          - name: role
            label: "Job Title"
            type: string
          - name: company
            label: "Company/Venue"
            type: string
          - name: timeline
            label: "Dates Active"
            type: string
          - name: bullets
            label: "Accomplishment Bullets"
            type: list
            field: { type: string, label: "Bullet" }

      - name: education_tab
        label: "Tab 2: Education Tracks"
        type: list
        fields:
          - name: degree
            label: "Degree/Certificate"
            type: string
          - name: school
            label: "Institution"
            type: string
          - name: date
            label: "Graduation Date"
            type: string
          - name: focus
            label: "Specialization Major Focus"
            type: string
          - name: description
            label: "Track Overview"
            type: text

      - name: academic_tab
        label: "Tab 3: Academic Works Dashboard"
        type: list
        fields:
          - name: tag
            label: "Subject/Domain Tag"
            type: string
          - name: title
            label: "Project Title"
            type: string
          - name: desc
            label: "Project Details Overview"
            type: text
          - name: link
            label: "Document Asset Path (Optional)"
            type: string
          - name: link_text
            label: "Link Button Label Text"
            type: string

      - name: skills_tab
        label: "Tab 4: Competencies Clusters"
        type: list
        fields:
          - name: title
            label: "Skill Category Group Title"
            type: string
          - name: pills
            label: "Individual Skill Pills"
            type: list
            field: { type: string, label: "Skill tag" }